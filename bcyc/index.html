<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pustemusikk Prototype</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    touch-action: manipulation;
  }

  canvas {
    display: block;
  }

  #phaseText {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 5vw;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="phaseText">TAP TO START</div>

<canvas id="canvas"></canvas>
<audio id="audio" src="audio.mp3" preload="auto" playsinline webkit-playsinline></audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("audio");
const phaseText = document.getElementById("phaseText");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function getCenterX() { return canvas.width / 2; }
function getCenterY() { return canvas.height / 2; }

const lungRadius = 100;
let particles = [];

function spawn() {
  return {
    x: Math.random() * getCenterX() * 0.9,
    y: Math.random() * canvas.height,
    vx: 0,
    vy: 0,
    size: Math.random() * 2 + 1,
    alpha: 0.8,
    depth: Math.random(),
    active: false,
    dead: false,
    releaseOffset: null
  };
}

for (let i = 0; i < 300; i++) {
  particles.push(spawn());
}

function getBreath(t) {
  const c = 10;
  const l = t % c;
  if (l < 5) return { phase: "inhale", p: l / 5 };
  return { phase: "exhale", p: (l - 5) / 5 };
}

function draw(p) {
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
  ctx.fill();
}

function animate() {
  requestAnimationFrame(animate);

  const cx = getCenterX();
  const cy = getCenterY();

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const t = audio.currentTime || 0;
  const isPaused = audio.paused;
  const b = isPaused ? null : getBreath(t);

  phaseText.innerText = isPaused ? "TAP TO START" : b.phase.toUpperCase();

  const targetCount = 300;
  if (particles.length < targetCount) {
    const needed = targetCount - particles.length;
    for (let i = 0; i < needed; i++) {
      particles.push(spawn());
    }
  }

  particles.forEach(p => {
    // PAUSE-TILSTAND
    if (isPaused) {
      p.vx *= 0.95;
      p.vy *= 0.95;

      p.vx += (Math.random() - 0.5) * 0.05;
      p.vy += (Math.random() - 0.5) * 0.05;

      p.x += p.vx;
      p.y += p.vy;

      draw(p);
      return;
    }

    // Fjern partikler som havner på høyre side under innpust
    if (b.phase === "inhale" && p.x > cx) {
      p.dead = true;
      return;
    }

    // INHALE
    if (b.phase === "inhale") {
      p.releaseOffset = null;
      p.active = false;
      p.alpha = 0.8;

      if (p.x < cx) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * lungRadius;

        const tx = cx + Math.cos(angle) * r;
        const ty = cy + Math.sin(angle) * r;

        const ddx = tx - p.x;
        const ddy = ty - p.y;

        const wave = Math.sin(b.p * Math.PI);
        const endPhase = Math.max(0, (b.p - 0.8) / 0.2);
        const depthFactor = 0.5 + p.depth;

        p.vx += ddx * 0.004 * wave * depthFactor;
        p.vy += ddy * 0.004 * wave * depthFactor;

        const friction = 0.79 - (wave * 0.02);
        p.vx *= friction;
        p.vy *= friction;

        if (endPhase > 0) {
          p.vx *= (1 - endPhase * 0.004);
          p.vy *= (1 - endPhase * 0.003);

          p.vx -= ddx * 0.00015 * endPhase;
          p.vy -= ddy * 0.00015 * endPhase;
        }

        p.x += p.vx;
        p.y += p.vy;
      }
    }

    // EXHALE
    if (b.phase === "exhale") {
      if (p.x < cx) {
        const recoil = 1 - Math.exp(-b.p * 6);

        const dxLeft = cx - p.x;
        const dyLeft = cy - p.y;
        const distLeft = Math.sqrt(dxLeft * dxLeft + dyLeft * dyLeft) + 0.001;

        p.vx -= (dxLeft / distLeft) * recoil * 0.002;
        p.vy -= (dyLeft / distLeft) * recoil * 0.004;

        const jitter = (Math.random() - 0.5) * 0.15 * recoil;
        p.vx += jitter;
        p.vy += jitter * 0.5;

        p.vx *= 0.8;
        p.vy *= 0.95;
      }

      const dx = p.x - cx;
      const dy = p.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < lungRadius) {
        if (p.releaseOffset === null) {
          p.releaseOffset = Math.random() * 0.4;
        }

        const localP = Math.max(0, (b.p - p.releaseOffset) / (1 - p.releaseOffset));

        if (localP > 0) {
          const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 2.2;
          const baseForce = 2 + Math.random() * 5;
          const forceWave = 0.2 + Math.sin(localP * Math.PI) * 0.8;
          const force = baseForce * forceWave;
          const mass = 0.7 + Math.random() * 0.008;

          p.vx += Math.cos(angle) * force * mass + 1.5;
          p.vy += Math.sin(angle) * force * mass;

          p.active = true;
        }
      }

      if (p.active) {
        p.vx *= 0.985;
        p.vy *= 0.985;

        p.x += p.vx;
        p.y += p.vy;
      }

      // Fade kun for aktive utpust-partikler, siste 20%
      if (p.active) {
        const fadeStart = 0.8;
        if (b.p > fadeStart) {
          const fadeProgress = (b.p - fadeStart) / (1 - fadeStart);
          const fade = 1 - fadeProgress;
          p.alpha = 0.8 * fade;
        } else {
          p.alpha = 0.8;
        }
      } else {
        p.alpha = 0.8;
      }

      if (p.x > canvas.width) {
        p.dead = true;
      }
    }

    if (b.phase === "inhale" && p.x < cx) draw(p);
    if (b.phase === "exhale") draw(p);
  });

  particles = particles.filter(p => !p.dead);

  ctx.beginPath();
  ctx.arc(cx, cy, lungRadius, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.stroke();
}

animate();

// Audio unlock for touch devices
document.body.addEventListener("touchstart", () => {
  audio.muted = false;
}, { once: true });

let hasStarted = false;
let lastTap = 0;

document.body.addEventListener("pointerdown", () => {
  audio.muted = false;

  if (!hasStarted) {
    audio.play().catch(() => {});
    hasStarted = true;
    lastTap = Date.now();
    return;
  }

  const now = Date.now();

  // Dobbelttrykk = restart
  if (now - lastTap < 300) {
    audio.pause();
    audio.currentTime = 0;
    audio.play().catch(() => {});
    lastTap = 0;
    return;
  }

  // Enkel trykk = pause/play
  if (audio.paused) {
    audio.play().catch(() => {});
  } else {
    audio.pause();
  }

  lastTap = now;
});
</script>

</body>
</html>
