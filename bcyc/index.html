<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Pustemusikk</title>

<style>
  body { margin:0; background:black; overflow:hidden; }
  canvas { display:block; }

  #phaseText {
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    transform:translateY(-50%);
    color:rgba(255,255,255,0.5);
    font-size:24px;
    letter-spacing:3px;
  }
</style>
</head>
<body>

<div id="phaseText">TAP TO START</div>
<canvas id="canvas"></canvas>

<audio id="audio" src="audio.mp3" preload="auto" playsinline></audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("audio");
const text = document.getElementById("phaseText");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const cx = canvas.width / 2;
const cy = canvas.height / 2;
const radius = 100;

let particles = [];

// spawn venstre side
function spawn(){
  return {
    x: Math.random() * cx * 0.9,
    y: Math.random() * canvas.height,
    vx: 0,
    vy: 0,
    size: Math.random()*2+1,
    alpha: 0.8,
    active:false
  };
}

for(let i=0;i<300;i++) particles.push(spawn());

// pust
function breath(t){
  let cycle = 10;
  let l = t % cycle;
  if(l < 5) return {phase:"inhale", p:l/5};
  return {phase:"exhale", p:(l-5)/5};
}

function draw(p){
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
  ctx.fill();
}

function animate(){
  requestAnimationFrame(animate);

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let t = audio.currentTime || 0;
  let b = breath(t);

  text.innerText = !audio.paused ? b.phase.toUpperCase() : "TAP TO START";

  particles.forEach(p=>{

    // fjern høyre side under inhale
    if(b.phase==="inhale" && p.x > cx){
      p.dead = true;
      return;
    }

    // INHALE
    if(b.phase==="inhale" && p.x < cx){
      let dx = cx - p.x;
      let dy = cy - p.y;

      let wave = Math.sin(b.p * Math.PI);

      p.vx += dx * 0.0003 * wave;
      p.vy += dy * 0.0003 * wave;

      p.vx *= 0.87;
      p.vy *= 0.87;

      p.x += p.vx;
      p.y += p.vy;
    }

    // EXHALE
    if(b.phase==="exhale"){

      let dx = p.x - cx;
      let dy = p.y - cy;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < radius){
        let angle = Math.atan2(dy,dx);
        let force = 2 + Math.random()*3;

        p.vx += Math.cos(angle) * force;
        p.vy += Math.sin(angle) * force;

        p.active = true;
      }

      if(p.active){
        p.vx *= 0.89;
        p.vy *= 0.89;

        p.x += p.vx;
        p.y += p.vy;
      }

      if(p.x > canvas.width) p.dead = true;
    }

    draw(p);
  });

  particles = particles.filter(p => !p.dead);

  // fyll på
  while(particles.length < 300){
    particles.push(spawn());
  }

  // sirkel
  ctx.beginPath();
  ctx.arc(cx,cy,radius,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,0.05)";
  ctx.stroke();
}

animate();


// 🔥 SUPER STABIL AUDIO START
function startAudio(){

  // viktig for mobil
  audio.muted = false;

  audio.play().then(()=>{
    console.log("PLAY OK");
  }).catch(e=>{
    console.log("PLAY BLOCKED", e);
  });
}

// pointerdown = best
document.body.addEventListener("pointerdown", startAudio);

// fallback for eldre mobil
document.body.addEventListener("touchstart", startAudio);

</script>

</body>
</html>
