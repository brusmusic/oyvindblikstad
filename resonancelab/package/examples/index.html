<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReSonance Lab Logo Example</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f6f1;
        color: #17201d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 28px;
        justify-items: center;
      }

      img {
        width: min(72vw, 360px);
        height: auto;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 520;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="../assets/logo-animated.svg" alt="ReSonance Lab" width="360" height="360" />
      <h1>ReSonance Lab</h1>
    </main>
  </body>
</html>
