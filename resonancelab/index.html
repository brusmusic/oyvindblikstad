<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReSonance Lab</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JHLZQYTV2H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-JHLZQYTV2H');
    </script>
    <meta name="description" content="ReSonance Lab." />
    <link rel="icon" href="/assets/resonancelab/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --ink: #17201d;
        --paper: #f7f6f1;
        --field-a: #4f8f7b;
        --field-b: #486f9c;
        --field-c: #b18458;
        --line: rgba(23, 32, 29, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 48%, rgba(255, 255, 255, 0.78), transparent 36rem),
          var(--paper);
        color: var(--ink);
      }

      a {
        display: grid;
        place-items: center;
        width: min(88vw, 760px);
        aspect-ratio: 1;
      }

      .mark {
        width: 100%;
        height: auto;
        overflow: visible;
      }

      .field {
        mix-blend-mode: multiply;
        opacity: 0.55;
        transform-box: fill-box;
        transform-origin: center;
        animation-duration: 9s;
        animation-iteration-count: infinite;
        animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1);
        filter: url(#soft-field);
      }

      .field-ring {
        fill: none;
        mix-blend-mode: multiply;
        opacity: 0.28;
        stroke-width: 1.4;
        vector-effect: non-scaling-stroke;
        transform-box: fill-box;
        transform-origin: center;
        animation-duration: 9s;
        animation-iteration-count: infinite;
        animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1);
      }

      .field-a,
      .ring-a {
        animation-name: breathe-a;
      }

      .field-a {
        fill: var(--field-a);
      }

      .ring-a {
        stroke: var(--field-a);
      }

      .field-b,
      .ring-b {
        animation-name: breathe-b;
        animation-delay: -2.2s;
      }

      .field-b {
        fill: var(--field-b);
      }

      .ring-b {
        stroke: var(--field-b);
      }

      .field-c,
      .ring-c {
        animation-name: breathe-c;
        animation-delay: -4.7s;
      }

      .field-c {
        fill: var(--field-c);
      }

      .ring-c {
        stroke: var(--field-c);
      }

      .inner-ring {
        opacity: 0.2;
      }

      .middle-ring {
        opacity: 0.24;
      }

      .outer-ring {
        opacity: 0.18;
      }

      .shared-center {
        fill: url(#center-glow);
        opacity: 0.94;
        transform-origin: 200px 200px;
        animation: center-rise 7.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }

      .irrational-line {
        fill: none;
        stroke: rgba(247, 246, 241, 0.34);
        stroke-linecap: round;
        stroke-width: 1.4;
        vector-effect: non-scaling-stroke;
        transform-origin: 200px 200px;
        animation-duration: 12s;
        animation-iteration-count: infinite;
        animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1);
      }

      .line-one {
        animation-name: string-drift-one;
      }

      .line-two {
        animation-name: string-drift-two;
        animation-delay: -3.8s;
      }

      .line-three {
        animation-name: string-drift-three;
        animation-delay: -7.1s;
      }

      .ripple {
        fill: none;
        stroke: rgba(247, 246, 241, 0.88);
        stroke-width: 1.6;
        transform-origin: 200px 200px;
        animation: ripple 7.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .ripple.two {
        animation-delay: -3.6s;
        stroke: rgba(23, 32, 29, 0.18);
        stroke-width: 1.2;
      }

      .geometry-line {
        fill: none;
        stroke: var(--line);
        stroke-width: 1.2;
        vector-effect: non-scaling-stroke;
      }

      @keyframes breathe-a {
        0%,
        100% {
          transform: translate(-1px, 0) scale(1);
        }
        50% {
          transform: translate(4px, -2px) scale(1.018);
        }
      }

      @keyframes breathe-b {
        0%,
        100% {
          transform: translate(1px, 1px) scale(1);
        }
        50% {
          transform: translate(-3px, 3px) scale(1.014);
        }
      }

      @keyframes breathe-c {
        0%,
        100% {
          transform: translate(0, -1px) scale(1);
        }
        50% {
          transform: translate(0, 4px) scale(1.016);
        }
      }

      @keyframes center-rise {
        0%,
        100% {
          opacity: 0.62;
          transform: scale(0.94);
        }
        48% {
          opacity: 0.95;
          transform: scale(1.04);
        }
      }

      @keyframes ripple {
        0% {
          opacity: 0;
          transform: scale(0.72);
        }
        22% {
          opacity: 0.54;
        }
        70% {
          opacity: 0.08;
          transform: scale(1.22);
        }
        100% {
          opacity: 0;
          transform: scale(1.3);
        }
      }

      @keyframes string-drift-one {
        0%,
        100% {
          transform: translate(-2px, 1px) rotate(-1deg);
          opacity: 0.22;
        }
        42% {
          transform: translate(5px, -4px) rotate(1.8deg);
          opacity: 0.4;
        }
        72% {
          transform: translate(-1px, 5px) rotate(0.6deg);
          opacity: 0.3;
        }
      }

      @keyframes string-drift-two {
        0%,
        100% {
          transform: translate(3px, -2px) rotate(1.2deg);
          opacity: 0.26;
        }
        48% {
          transform: translate(-5px, 4px) rotate(-1.6deg);
          opacity: 0.38;
        }
        76% {
          transform: translate(2px, 6px) rotate(-0.4deg);
          opacity: 0.28;
        }
      }

      @keyframes string-drift-three {
        0%,
        100% {
          transform: translate(1px, 3px) rotate(-0.8deg);
          opacity: 0.2;
        }
        46% {
          transform: translate(6px, 1px) rotate(1.4deg);
          opacity: 0.36;
        }
        78% {
          transform: translate(-4px, -5px) rotate(-1.2deg);
          opacity: 0.3;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .field,
        .field-ring,
        .shared-center,
        .irrational-line,
        .ripple {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <a href="/" aria-label="ReSonance Lab home">
      <svg
        class="mark"
        viewBox="0 0 400 400"
        role="img"
        aria-labelledby="mark-title mark-desc"
        xmlns="http://www.w3.org/2000/svg"
      >
        <title id="mark-title">ReSonance Lab animated logo</title>
        <desc id="mark-desc">Three overlapping circular fields breathe around a shared center.</desc>
        <defs>
          <filter id="soft-field" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.1" />
          </filter>
          <filter id="irrational-field" x="-45%" y="-45%" width="190%" height="190%">
            <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="3" seed="17" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="11" />
            <feGaussianBlur stdDeviation="1.2" />
          </filter>
          <clipPath id="clip-left">
            <circle cx="166" cy="212" r="134" />
          </clipPath>
          <clipPath id="clip-right">
            <circle cx="234" cy="212" r="134" />
          </clipPath>
          <clipPath id="clip-top">
            <circle cx="200" cy="154" r="134" />
          </clipPath>
          <radialGradient id="center-glow" cx="50%" cy="50%" r="58%">
            <stop offset="0%" stop-color="#fbfff7" stop-opacity="0.96" />
            <stop offset="38%" stop-color="#dceee3" stop-opacity="0.82" />
            <stop offset="100%" stop-color="#cddfd4" stop-opacity="0.18" />
          </radialGradient>
        </defs>

        <g aria-hidden="true">
          <circle class="field field-a" cx="166" cy="212" r="134" />
          <circle class="field field-b" cx="234" cy="212" r="134" />
          <circle class="field field-c" cx="200" cy="154" r="134" />

          <circle class="field-ring ring-a inner-ring" cx="166" cy="212" r="58" />
          <circle class="field-ring ring-a middle-ring" cx="166" cy="212" r="91" />
          <circle class="field-ring ring-a outer-ring" cx="166" cy="212" r="122" />

          <circle class="field-ring ring-b inner-ring" cx="234" cy="212" r="58" />
          <circle class="field-ring ring-b middle-ring" cx="234" cy="212" r="91" />
          <circle class="field-ring ring-b outer-ring" cx="234" cy="212" r="122" />

          <circle class="field-ring ring-c inner-ring" cx="200" cy="154" r="58" />
          <circle class="field-ring ring-c middle-ring" cx="200" cy="154" r="91" />
          <circle class="field-ring ring-c outer-ring" cx="200" cy="154" r="122" />

          <g clip-path="url(#clip-left)">
            <g clip-path="url(#clip-right)">
              <g clip-path="url(#clip-top)">
                <path
                  class="shared-center"
                  filter="url(#irrational-field)"
                  d="M158 149 C178 129 208 136 232 145 C260 156 278 184 272 212 C265 242 237 264 207 272 C178 279 144 265 130 239 C116 213 122 180 143 162 C149 157 153 153 158 149Z"
                />
                <path
                  class="irrational-line line-one"
                  d="M143 192 C158 176 178 184 190 203 C202 222 222 226 238 211 C252 198 250 177 266 168"
                />
                <path
                  class="irrational-line line-two"
                  d="M138 221 C157 237 181 229 188 207 C196 184 218 171 239 184 C254 193 259 214 273 225"
                />
                <path
                  class="irrational-line line-three"
                  d="M154 166 C175 158 185 176 179 195 C173 216 190 239 214 236 C236 233 242 207 259 197"
                />
                <circle class="ripple" cx="200" cy="200" r="48" />
                <circle class="ripple two" cx="200" cy="200" r="36" />
              </g>
            </g>
          </g>

          <circle class="geometry-line" cx="166" cy="212" r="134" />
          <circle class="geometry-line" cx="234" cy="212" r="134" />
          <circle class="geometry-line" cx="200" cy="154" r="134" />
        </g>
      </svg>
    </a>
  </body>
</html>
